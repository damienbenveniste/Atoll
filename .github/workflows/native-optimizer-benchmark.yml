name: Generic Native Optimizer Hard Benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: generic-native-optimizer-hard-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    name: Native families and cold batching (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
    steps:
      - name: Check out Atoll
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Sync Atoll
        run: uv sync --frozen --all-groups --python 3.12

      - name: Validate calibration execution provenance
        run: uv run --python 3.12 python -m scripts.benchmark_corpus validate

      - name: Verify representative cold Cython batching
        run: >-
          uv run --python 3.12 python scripts/run_cython_batch_benchmark.py
          --workspace "$RUNNER_TEMP/cython-batch-${{ runner.os }}"
          --evidence "$RUNNER_TEMP/cython-batch-${{ runner.os }}.json"

      - name: Run native family hard gates
        run: >-
          uv run --python 3.12 python scripts/run_native_optimizer_benchmark.py
          --workspace "$RUNNER_TEMP/native-optimizer-${{ runner.os }}"
          --evidence-root "$RUNNER_TEMP/native-optimizer-evidence-${{ runner.os }}"

      - name: Upload native optimizer evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-optimizer-hard-benchmark-${{ matrix.os }}
          path: |
            ${{ runner.temp }}/cython-batch-${{ runner.os }}.json
            ${{ runner.temp }}/native-optimizer-evidence-${{ runner.os }}
          if-no-files-found: warn
          retention-days: 30
