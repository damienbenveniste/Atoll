name: Generic Source Optimizer Hard Benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: generic-source-optimizer-hard-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    name: Guarded async source optimizer 3x acceptance
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Check out Atoll
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Sync Atoll
        run: uv sync --frozen --all-groups --python 3.12

      - name: Run generic guarded feasibility gate
        run: >-
          uv run --python 3.12 python scripts/async_execution_plan_feasibility.py
          | tee "$RUNNER_TEMP/source-optimization-feasibility.json"

      - name: Upload generic benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: generic-source-optimizer-3x-evidence
          path: ${{ runner.temp }}/source-optimization-feasibility.json
          if-no-files-found: warn
          retention-days: 30
