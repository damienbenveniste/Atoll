name: Generic Source Optimizer Hard Benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: generic-source-optimizer-hard-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    name: Residual async optimizer 3x acceptance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
    steps:
      - name: Check out Atoll
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Sync Atoll
        run: uv sync --frozen --all-groups --python 3.12

      - name: Run generic residual async hard gate
        run: |
          set -o pipefail
          uv run --python 3.12 python scripts/run_residual_async_profile_benchmark.py \
            | tee "$RUNNER_TEMP/source-optimization-evidence-${{ runner.os }}.json"

      - name: Upload generic benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: generic-source-optimizer-3x-evidence-${{ matrix.os }}
          path: ${{ runner.temp }}/source-optimization-evidence-${{ runner.os }}.json
          if-no-files-found: warn
          retention-days: 30
