name: Pydantic Graph Hard Benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pydantic-graph-hard-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    name: Schema v6 composed optimizer 3x acceptance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
    steps:
      - name: Check out Atoll
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Sync Atoll
        run: uv sync --frozen --all-groups --python 3.12

      - name: Run pinned hard benchmark
        run: >-
          uv run --python 3.12 python scripts/run_pydantic_graph_benchmark.py
          --workspace "$RUNNER_TEMP/pydantic-ai-${{ runner.os }}"
          --evidence-root "$RUNNER_TEMP/pydantic-graph-evidence-${{ runner.os }}"

      - name: Upload schema v6 composition evidence
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pydantic-graph-hard-benchmark-schema-v6-${{ matrix.os }}
          path: ${{ runner.temp }}/pydantic-graph-evidence-${{ runner.os }}
          if-no-files-found: warn
          retention-days: 30
