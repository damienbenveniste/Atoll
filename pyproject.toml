[project]
name = "atoll"
version = "0.1.0"
description = "atoll generated by scaffold-guard."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "build>=1.2",
    "Cython>=3.1",
    "mypy>=1.17.0",
    "packaging>=24",
    "setuptools>=69",
    "wheel>=0.43",
]

[project.scripts]
atoll = "atoll.cli:main"

[dependency-groups]
dev = [
    "scaffold-guard>=0.1.3",
    "mkdocs>=1.6.0",
    "mkdocs-material>=9.6.0",
    "pytest>=8.4.0",
    "pytest-cov>=6.2.0",
    "pyright>=1.1.400",
    "types-setuptools>=69",
    "ruff>=0.12.0",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/atoll"]


[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests", "examples"]

[tool.ruff.lint]
select = [

    "ANN",
    "ARG",

    "B",
    "C4",

    "C90",

    "D",
    "E",
    "F",
    "I",
    "N",
    "PERF",
    "PIE",

    "PL",

    "PT",
    "PTH",
    "RET",
    "RUF",
    "S",
    "SIM",
    "TRY",
    "UP",
]
ignore = [
    "TRY003",
]


[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 60

[tool.ruff.lint.pydocstyle]
convention = "google"


[tool.ruff.lint.per-file-ignores]
"src/atoll/runtime/package_verify.py" = ["S603"]
"src/atoll/runtime/performance.py" = ["S603"]
"src/atoll/wheel_overlay.py" = ["S603"]
"scripts/run_pydantic_graph_benchmark.py" = ["S603"]
"tests/**/*.py" = ["D", "S101"]



[tool.mypy]
python_version = "3.12"

strict = true

warn_unreachable = true
pretty = true
show_error_codes = true


[tool.pytest.ini_options]
minversion = "8.4"
testpaths = ["tests"]
norecursedirs = ["tests/fixtures"]
pythonpath = ["src", "."]
addopts = [
    "--strict-config",
    "--strict-markers",
]

[tool.coverage.run]
branch = true
source = ["atoll"]

[tool.coverage.report]
fail_under = 95
show_missing = true
skip_covered = true
exclude_also = [
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
